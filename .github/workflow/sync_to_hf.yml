name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Runs every time you push to the main branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'your-hf-username' and 'your-space-name' with your actual details
          git push --force https:///komalp98:$HF_TOKEN@huggingface.co/spaces/komalp98/football-analytics-dashboard main
